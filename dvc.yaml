# dvc.yaml
stages:
  prepare:
    cmd: python src/prepare.py
    deps:
      - src/prepare.py
    outs:
      - data/processed

  train:
    cmd: python src/train.py
    deps:
      - src/train.py
      - data/processed
    params:
      - epochs
      - lr
    outs:
      - model.pt
    metrics:
      - metrics.json

  predict:
    cmd: python src/predict.py
    deps:
      - src/predict.py
      - model.pt
      - data/processed/test.pt
    outs:
      - predictions.json